<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Calculator</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1e1e2f;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'SF Pro Display', 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }

    /* ── App Shell ── */
    #calculator-view {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }

    #safe-screen-view {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      width: 100%;
      height: 100%;
      background: #0d0d14;
      overflow-y: auto;
      padding: 0 0 40px;
    }

    /* ── Calculator ── */
    .Calculator {
      background-color: #2c2c3e;
      padding: 20px;
      border-radius: 15px;
      width: 280px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
    }

    /* Display screen */
    #calc-display {
      width: 100%;
      min-height: 70px;
      background-color: #000;
      color: #0f0;
      font-size: 2rem;
      font-family: 'Courier New', monospace;
      text-align: right;
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 18px;
      overflow: hidden;
      letter-spacing: 1px;
      word-break: break-all;
    }

    /* Button grid */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    /* All buttons */
    .button-grid button {
      padding: 18px 0;
      font-size: 1.15rem;
      border: none;
      border-radius: 10px;
      background: #3a3a55;
      color: #fff;
      cursor: pointer;
      transition: background 0.15s, transform 0.08s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .button-grid button:hover {
      background: #57577a;
    }

    .button-grid button:active {
      transform: scale(0.94);
    }

    /* Equal button */
    .button-grid .equal {
      background: #ff9500;
      grid-column: span 2;
    }
    .button-grid .equal:hover { background: #e08900; }

    /* Clear button */
    .button-grid .clear {
      background: #ff3b3b;
    }
    .button-grid .clear:hover { background: #d63030; }

    /* Operator buttons */
    .button-grid .operator {
      background: #505070;
      color: #f0a500;
      font-weight: bold;
    }
    .button-grid .operator:hover { background: #65658a; }

    .button-grid .fn {
      background: #4a4a6a;
      color: #ccc;
    }
    .button-grid .fn:hover { background: #5c5c80; }

    .safe-header {
      width: 100%;
      background: #12121e;
      padding: 22px 24px 16px;
      border-bottom: 1px solid #1e1e35;
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .safe-header-title {
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    #close-safe-btn {
      background: #2a2a3e;
      border: none;
      color: #888;
      font-size: 0.8rem;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s, color 0.2s;
    }

    #close-safe-btn:hover {
      background: #3a3a55;
      color: #bbb;
    }

    #safe-screen-content {
      width: 100%;
      max-width: 420px;
      padding: 24px 20px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* SOS Button */
    .sos-wrapper {
      margin-bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
    }

    #sos-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff5555, #cc0000);
      border: 4px solid #ff4444;
      color: #fff;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      cursor: pointer;
      box-shadow:
        0 0 0 8px rgba(200, 0, 0, 0.15),
        0 0 30px rgba(200, 0, 0, 0.4),
        0 6px 20px rgba(0, 0, 0, 0.6);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: pulse-ring 2.5s ease-out infinite;
    }

    #sos-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 0 0 12px rgba(200, 0, 0, 0.2),
        0 0 40px rgba(200, 0, 0, 0.5),
        0 8px 24px rgba(0, 0, 0, 0.7);
    }

    #sos-btn:active {
      transform: scale(0.96);
    }

    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(200,0,0,0.4), 0 0 30px rgba(200,0,0,0.3), 0 6px 20px rgba(0,0,0,0.6); }
      70%  { box-shadow: 0 0 0 18px rgba(200,0,0,0), 0 0 30px rgba(200,0,0,0.3), 0 6px 20px rgba(0,0,0,0.6); }
      100% { box-shadow: 0 0 0 0 rgba(200,0,0,0), 0 0 30px rgba(200,0,0,0.3), 0 6px 20px rgba(0,0,0,0.6); }
    }

    .safe-hint {
      font-size: 0.78rem;
      color: #555;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.02em;
    }

    .contacts-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .contact-card {
      background: #16162a;
      border: 1px solid #222238;
      border-radius: 12px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: border-color 0.2s;
    }

    .contact-card:hover {
      border-color: #3a3a5a;
    }

    .contact-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
    }

    .contact-info {
      flex: 1;
      min-width: 0;
    }

    .contact-name {
      color: #ddd;
      font-size: 0.88rem;
      font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .contact-desc {
      color: #555;
      font-size: 0.75rem;
    }

    .contact-call-btn {
      flex-shrink: 0;
      background: #1a3a1a;
      color: #4caf50;
      border: 1px solid #2a5a2a;
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.03em;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
    }

    .contact-call-btn:hover {
      background: #1f4a1f;
      border-color: #3a7a3a;
    }
  </style>
</head>
<body>

  <div id="calculator-view">
    <div class="Calculator">

      <div id="calc-display">0</div>

      <div class="button-grid">

        <button class="fn clear" onclick="Calculator.clear()">AC</button>
        <button class="fn"       onclick="Calculator.toggleSign()">+/-</button>
        <button class="fn"       onclick="Calculator.percentage()">%</button>
        <button class="operator" onclick="Calculator.setOperator('/')">÷</button>

        <button onclick="Calculator.appendDigit('7')">7</button>
        <button onclick="Calculator.appendDigit('8')">8</button>
        <button onclick="Calculator.appendDigit('9')">9</button>
        <button class="operator" onclick="Calculator.setOperator('*')">×</button>

        <button onclick="Calculator.appendDigit('4')">4</button>
        <button onclick="Calculator.appendDigit('5')">5</button>
        <button onclick="Calculator.appendDigit('6')">6</button>
        <button class="operator" onclick="Calculator.setOperator('-')">−</button>

        <button onclick="Calculator.appendDigit('1')">1</button>
        <button onclick="Calculator.appendDigit('2')">2</button>
        <button onclick="Calculator.appendDigit('3')">3</button>
        <button class="operator" id="btn-plus" onclick="Calculator.setOperator('+')">+</button>

        <!-- Row 5: ⌫  0  .  = -->
        <button class="fn" onclick="Calculator.backspace()">⌫</button>
        <button onclick="Calculator.appendDigit('0')">0</button>
        <button onclick="Calculator.appendDigit('.')">.</button>
        <button class="equal" onclick="Calculator.evaluate()">=</button>

      </div>
    </div>
  </div>

  <div id="safe-screen-view">

    <div class="safe-header">
      <span class="safe-header-title">Emergency Contacts</span>
      <button id="close-safe-btn">✕ Close</button>
    </div>

    <div id="safe-screen-content"></div>

  </div>

  <script src="logic.js"></script>

  </script>

</body>
</html>
