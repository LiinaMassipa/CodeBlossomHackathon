<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Emergency Calculator - Calculator with hidden safety features" />
  <title>Calculator</title>
  <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="\manifest.json" />
    <!--ios support-->
    <link rel="apple-touch-icon" href="icons/icon-96x96.png" />
   <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
   <meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SafeCalc">
<link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>

  <div id="calculator-view">
    <div class="Calculator">
      
      <!-- Fixed Display with Expression and Main Display -->
      <div id="calc-display">
        <div id="display-expr" class="display-expr"></div>
        <div id="display-main" class="display-main">0</div>
      </div>

      <div class="button-grid">
        <!-- Row 1: Functions -->
        <button class="fn clear" data-action="clear">AC</button>
        <button class="fn" data-action="toggleSign">+/-</button>
        <button class="fn" data-action="percentage">%</button>
        <button class="operator" data-operator="/">÷</button>

        <!-- Row 2: 7-9 and multiply -->
        <button data-digit="7">7</button>
        <button data-digit="8">8</button>
        <button data-digit="9">9</button>
        <button class="operator" data-operator="*">×</button>

        <!-- Row 3: 4-6 and subtract -->
        <button data-digit="4">4</button>
        <button data-digit="5">5</button>
        <button data-digit="6">6</button>
        <button class="operator" data-operator="-">−</button>

        <!-- Row 4: 1-3 and add (with double-tap safety) -->
        <button data-digit="1">1</button>
        <button data-digit="2">2</button>
        <button data-digit="3">3</button>
        <button class="operator" id="btn-plus" data-operator="+">+</button>

        <!-- Row 5: Backspace, 0, decimal, equals -->
        <button class="fn" data-action="backspace">⌫</button>
        <button data-digit="0">0</button>
        <button data-digit=".">.</button>
        <button class="equal" data-action="evaluate">=</button>
      </div>
    </div>
  </div>

  <div id="safe-screen-view" style="display: none;">
    <div class="safe-header">
      <span class="safe-header-title">Emergency Contacts 🚨</span>
    </div>

    <!-- Country Selector -->
    <div class="country-selector-wrapper">
      <label class="country-selector-label" for="country-select">Select your country</label>
      <select class="country-selector" id="country-select" aria-label="Select your country">
        <option value="" disabled selected>Choose a country</option>
        <option value="kenya">Kenya</option>
        <option value="namibia">Namibia</option>
        <option value="netherlands">Netherlands</option>
      </select>
    </div>

    <div id="safe-screen-content"></div>
    <button id="close-safe-btn" aria-label="Close emergency screen">✕ Close</button>
  </div>

  <script src="calculator.js"></script>
  <script src="safe-screen.js"></script>
  <script src="trigger.js"></script>
  <script src="app.js"></script>
  <script  src="/js/app.js"></script>

  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('Service worker registered'))
      .catch(() => console.log('Service worker not registered'));
  }
</script>
</body>
</html>
